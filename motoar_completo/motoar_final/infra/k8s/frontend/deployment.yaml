# ── k8s/frontend/deployment.yaml ─────────────────────────────────────────────
# Deployment do dashboard React (nginx)
# Porta interna: 80
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: motoar-frontend
  namespace: motoar
  labels:
    app: motoar-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: motoar-platform
spec:
  replicas: 2                        # Frontend stateless — pode escalar
  selector:
    matchLabels:
      app: motoar-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0              # Zero downtime
  template:
    metadata:
      labels:
        app: motoar-frontend
    spec:
      containers:
        - name: frontend
          image: motoar/frontend:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 80
              name: http

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# Service — expõe o frontend dentro do cluster
apiVersion: v1
kind: Service
metadata:
  name: motoar-frontend-svc
  namespace: motoar
  labels:
    app: motoar-frontend
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: motoar-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
