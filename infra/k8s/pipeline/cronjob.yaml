# ── k8s/pipeline/cronjob.yaml ────────────────────────────────────────────────
# CronJob que executa o pipeline Medalhão diariamente às 02:00 (horário Brasília)
# Bronze → Silver → Quality → Gold
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: motoar-pipeline
  namespace: motoar
  labels:
    app: motoar-pipeline
    app.kubernetes.io/component: pipeline
    app.kubernetes.io/part-of: motoar-platform
spec:
  # 02:00 UTC-3 (Brasília) = 05:00 UTC
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid          # não rodar em paralelo
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300       # cancela se não iniciar em 5 min

  jobTemplate:
    spec:
      backoffLimit: 2                # tenta até 2 vezes em caso de falha
      activeDeadlineSeconds: 3600    # timeout de 1h
      template:
        metadata:
          labels:
            app: motoar-pipeline
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: motoar/pipeline:latest
              imagePullPolicy: IfNotPresent

              # Comando: executa o orquestrador completo
              command: ["python", "orchestration/run_pipeline.py"]
              args:
                - "--fmt"
                - "parquet"
                - "--inmet"
                - "/data/raw/ESTACOES AUTOMATICAS _ DADOS BRUTO 2025.xlsx"

              # Variáveis de ambiente do ConfigMap
              envFrom:
                - configMapRef:
                    name: motoar-config

              # Volume do Data Lake compartilhado
              volumeMounts:
                - name: motoar-data
                  mountPath: /data

              # Recursos
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"

          volumes:
            - name: motoar-data
              persistentVolumeClaim:
                claimName: motoar-data-pvc

---
# Job manual para execução imediata (útil para testes e first deploy)
# kubectl apply -f k8s/pipeline/job-manual.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: motoar-pipeline-manual
  namespace: motoar
  labels:
    app: motoar-pipeline
    app.kubernetes.io/component: pipeline-manual
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: motoar-pipeline
    spec:
      restartPolicy: Never
      containers:
        - name: pipeline
          image: motoar/pipeline:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "orchestration/run_pipeline.py"]
          args: ["--fmt", "parquet"]
          envFrom:
            - configMapRef:
                name: motoar-config
          volumeMounts:
            - name: motoar-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: motoar-data
          persistentVolumeClaim:
            claimName: motoar-data-pvc
