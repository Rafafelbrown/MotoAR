# ── k8s/base/storage.yaml ────────────────────────────────────────────────────
# Volume persistente compartilhado entre pipeline, streamlit e mlflow
# Contém: /data/raw/  /data/bronze/  /data/silver/  /data/gold/  /data/mlruns/
# ─────────────────────────────────────────────────────────────────────────────

---
# PersistentVolume — disco local (ajuste para seu cloud provider)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: motoar-data-pv
  namespace: motoar
  labels:
    app.kubernetes.io/part-of: motoar-platform
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany          # Múltiplos pods leem/escrevem simultaneamente
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/motoar-data   # Ajustar para NFS ou PV do cloud em produção

---
# PersistentVolumeClaim — reivindicação do volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: motoar-data-pvc
  namespace: motoar
  labels:
    app.kubernetes.io/part-of: motoar-platform
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi
