# ── k8s/base/configmap.yaml ──────────────────────────────────────────────────
# Variáveis de configuração compartilhadas entre os serviços MotoAR
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: motoar-config
  namespace: motoar
  labels:
    app.kubernetes.io/part-of: motoar-platform
data:
  # Caminhos de dados dentro do volume compartilhado
  DATA_ROOT:         "/data"
  RAW_DIR:           "/data/raw"
  BRONZE_DIR:        "/data/bronze"
  SILVER_DIR:        "/data/silver"
  GOLD_DIR:          "/data/gold"
  MLRUNS_DIR:        "/data/mlruns"

  # Configuração do pipeline
  PIPELINE_FMT:      "parquet"
  INMET_FILE:        "ESTACOES AUTOMATICAS _ DADOS BRUTO 2025.xlsx"
  IQAIR_FILE:        "iqair_data.csv"

  # MLflow
  MLFLOW_TRACKING_URI: "sqlite:////data/mlruns/motoar.db"
  MLFLOW_EXPERIMENT:   "MotoAR-PM25-Predictor"

  # Streamlit
  STREAMLIT_PORT:    "8501"
  STREAMLIT_HOST:    "0.0.0.0"

  # MLflow UI
  MLFLOW_PORT:       "5000"
  MLFLOW_HOST:       "0.0.0.0"
