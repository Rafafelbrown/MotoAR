# ── k8s/base/ingress.yaml ────────────────────────────────────────────────────
# Ingress — roteamento externo para todos os serviços MotoAR
# Requer: nginx-ingress-controller instalado no cluster
#
# Rotas:
#   /           → dashboard React    (porta 80)
#   /app        → Streamlit          (porta 8501)
#   /mlflow     → MLflow UI          (porta 5000)
#
# Para instalar o ingress controller:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: motoar-ingress
  namespace: motoar
  labels:
    app.kubernetes.io/part-of: motoar-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # WebSocket para o Streamlit
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: motoar.local               # Alterar para domínio real em produção
      http:
        paths:
          # Dashboard React — rota raiz
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: motoar-frontend-svc
                port:
                  number: 80

          # Streamlit — análise interativa
          - path: /app(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: motoar-streamlit-svc
                port:
                  number: 8501

          # MLflow UI — governança de modelos
          - path: /mlflow(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: motoar-mlflow-svc
                port:
                  number: 5000
